name: CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with JUnit + coverage
        run: |
          PYTHONPATH=. pytest -q \
            --junitxml=junit.xml \
            --cov=src \
            --cov-report=xml:coverage.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            junit.xml
            coverage.xml

      - name: Upload JUnit via Redmine API (optional)
        if: always() && env.REDMINE_BASE_URL != '' && env.REDMINE_API_KEY != '' && env.REDMINE_BUILD_ID != ''
        env:
          REDMINE_BASE_URL: ${{ secrets.REDMINE_BASE_URL }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          REDMINE_BUILD_ID: ${{ secrets.REDMINE_BUILD_ID }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "X-Redmine-API-Key: ${REDMINE_API_KEY}" \
            -F "file=@junit.xml;type=application/xml" \
            "${REDMINE_BASE_URL}/devops/builds/${REDMINE_BUILD_ID}/test_results.json"

  deploy-staging:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Simulate staging deployment
        run: |
          echo "Deploying ${GITHUB_SHA} to staging"
          sleep 5
          echo "Staging deployment complete"

  deploy-production:
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Simulate production deployment
        run: |
          echo "Deploying ${GITHUB_SHA} to production"
          sleep 5
          echo "Production deployment complete"
